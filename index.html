<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Elegant Clock</title>

<style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #eee;
  margin: 0;
}

svg {
  width: 400px;
  height: 400px;
}

text {
  font-family: "Times New Roman", serif;
  font-size: 26px;
  fill: black;
  text-anchor: middle;
  dominant-baseline: middle;
}

.hand {
  transform-origin: 200px 200px;
}

/* ✨ ظریف و شیک */
.hour {
  fill: none;
  stroke: black;
  stroke-width: 3;
  stroke-linecap: round;
}

.minute {
  fill: none;
  stroke: black;
  stroke-width: 2;
  stroke-linecap: round;
}

.second {
  stroke: red;
  stroke-width: 1.5;
}

.center {
  fill: black;
}
</style>
</head>

<body>

<svg viewBox="0 0 400 400">

  <!-- center -->
  <circle cx="200" cy="200" r="4" class="center"/>

  <!-- numbers -->
  <g id="numbers"></g>

  <!-- ✨ Elegant Hour Hand -->
  <path id="hour" class="hand hour"
  d="M200 200
     C195 185, 195 170, 200 160
     C205 170, 205 185, 200 200
     M200 160 L200 135" />

  <!-- ✨ Elegant Minute Hand -->
  <path id="minute" class="hand minute"
  d="M200 200
     C193 175, 193 140, 200 120
     C207 140, 207 175, 200 200
     M200 120 L200 90" />

  <!-- ✨ Thin Second -->
  <line id="second" class="hand second"
        x1="200" y1="200" x2="200" y2="80"/>

</svg>

<script>
const romans = ["XII","I","II","III","IV","V","VI","VII","VIII","IX","X","XI"];
const radius = 160;
const centerX = 200;
const centerY = 200;

const group = document.getElementById("numbers");

romans.forEach((num, i) => {
  const angle = (i * 30 - 90) * Math.PI / 180;
  const x = centerX + radius * Math.cos(angle);
  const y = centerY + radius * Math.sin(angle);

  const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
  text.setAttribute("x", x);
  text.setAttribute("y", y);
  text.textContent = num;

  group.appendChild(text);
});

function updateClock() {
  const now = new Date();

  const sec = now.getSeconds();
  const min = now.getMinutes();
  const hr = now.getHours();

  const secDeg = sec * 6;
  const minDeg = min * 6 + sec * 0.1;
  const hrDeg = (hr % 12) * 30 + min * 0.5;

  document.getElementById("second").style.transform = `rotate(${secDeg}deg)`;
  document.getElementById("minute").style.transform = `rotate(${minDeg}deg)`;
  document.getElementById("hour").style.transform = `rotate(${hrDeg}deg)`;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
