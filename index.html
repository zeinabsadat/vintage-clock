<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Perfect Circle Roman Clock</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&display=swap" rel="stylesheet">

<style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: white;
  margin: 0;
}

svg {
  width: 600px;
  height: 600px;
  /* background: #f9f9f9; /* آنکامر کنید برای تست کادر دایره */
}

text {
  font-family: "Bodoni Moda", serif;
  font-size: 50px; 
  font-weight: 400;
  fill: black;
  text-anchor: middle;
  dominant-baseline: central; /* تنظیم دقیق مرکز عمودی */
  transform-box: fill-box;
  transform-origin: center;
  transform: scaleY(1.3); /* کشیدگی کلاسیک */
}

.hand {
  transform-origin: 300px 300px;
  fill: none;
  stroke: black;
  stroke-linecap: round;
}

.hour {
  stroke-width: 3.5;
}

.minute {
  stroke-width: 2.5;
}

.second {
  stroke: black;
  stroke-width: 1.2;
}

.center {
  fill: black;
}
</style>
</head>

<body>

<svg viewBox="0 0 600 600">
  <circle cx="300" cy="300" r="4" class="center"/>

  <g id="numbers"></g>

  <path id="hour" class="hand hour"
  d="M300 300
     C298 285, 298 265, 300 255
     C302 265, 302 285, 300 300
     M300 255 L300 215" />

  <path id="minute" class="hand minute"
  d="M300 300
     C295 270, 295 230, 300 215
     C305 230, 305 270, 300 300
     M300 215 L300 150" />

  <line id="second" class="hand second" x1="300" y1="300" x2="300" y2="120"/>
</svg>

<script>
const romans = ["XII","I","II","III","IV","V","VI","VII","VIII","IX","X","XI"];
const centerX = 300;
const centerY = 300;
const radius = 220; 

const group = document.getElementById("numbers");

romans.forEach((num, i) => {
  const angle = (i * 30 - 90) * Math.PI / 180;
  
  // محاسبه دقیق نقاط روی محیط دایره
  const x = centerX + radius * Math.cos(angle);
  const y = centerY + radius * Math.sin(angle);

  const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
  text.setAttribute("x", x);
  text.setAttribute("y", y);
  text.textContent = num;

  group.appendChild(text);
});

function updateClock() {
  const now = new Date();
  const sec = now.getSeconds();
  const min = now.getMinutes();
  const hr = now.getHours();

  const secDeg = sec * 6;
  const minDeg = min * 6 + sec * 0.1;
  const hrDeg = (hr % 12) * 30 + min * 0.5;

  document.getElementById("second").style.transform = `rotate(${secDeg}deg)`;
  document.getElementById("minute").style.transform = `rotate(${minDeg}deg)`;
  document.getElementById("hour").style.transform = `rotate(${hrDeg}deg)`;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
