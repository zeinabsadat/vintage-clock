<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Classic Clock</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f4f4f4;
      margin: 0;
    }

    .clock {
      width: 300px;
      height: 300px;
      border: 8px solid black;
      border-radius: 50%;
      position: relative;
      background: white;
    }

    .number {
      position: absolute;
      width: 100%;
      height: 100%;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      transform: rotate(var(--rotation));
    }

    .number span {
      display: block;
      transform: rotate(calc(-1 * var(--rotation)));
    }

    .number1 { --rotation: 30deg; }
    .number2 { --rotation: 60deg; }
    .number3 { --rotation: 90deg; }
    .number4 { --rotation: 120deg; }
    .number5 { --rotation: 150deg; }
    .number6 { --rotation: 180deg; }
    .number7 { --rotation: 210deg; }
    .number8 { --rotation: 240deg; }
    .number9 { --rotation: 270deg; }
    .number10 { --rotation: 300deg; }
    .number11 { --rotation: 330deg; }
    .number12 { --rotation: 0deg; }

    .hand {
      position: absolute;
      bottom: 50%;
      left: 50%;
      transform-origin: bottom;
      transform: translateX(-50%) rotate(0deg);
    }

    .hand.hour {
      width: 6px;
      height: 70px;
      background: black;
    }

    .hand.minute {
      width: 4px;
      height: 100px;
      background: black;
    }

    .hand.second {
      width: 2px;
      height: 120px;
      background: red;
    }

    .center {
      width: 10px;
      height: 10px;
      background: black;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
  </style>
</head>
<body>

<div class="clock">
  <div class="number number1"><span>I</span></div>
  <div class="number number2"><span>II</span></div>
  <div class="number number3"><span>III</span></div>
  <div class="number number4"><span>IV</span></div>
  <div class="number number5"><span>V</span></div>
  <div class="number number6"><span>VI</span></div>
  <div class="number number7"><span>VII</span></div>
  <div class="number number8"><span>VIII</span></div>
  <div class="number number9"><span>IX</span></div>
  <div class="number number10"><span>X</span></div>
  <div class="number number11"><span>XI</span></div>
  <div class="number number12"><span>XII</span></div>

  <div class="hand hour" id="hour"></div>
  <div class="hand minute" id="minute"></div>
  <div class="hand second" id="second"></div>

  <div class="center"></div>
</div>

<script>
  function setClock() {
    const now = new Date();

    const seconds = now.getSeconds();
    const minutes = now.getMinutes();
    const hours = now.getHours();

    const secondDeg = seconds * 6;
    const minuteDeg = minutes * 6 + seconds * 0.1;
    const hourDeg = (hours % 12) * 30 + minutes * 0.5;

    document.getElementById("second").style.transform =
      `translateX(-50%) rotate(${secondDeg}deg)`;

    document.getElementById("minute").style.transform =
      `translateX(-50%) rotate(${minuteDeg}deg)`;

    document.getElementById("hour").style.transform =
      `translateX(-50%) rotate(${hourDeg}deg)`;
  }

  setClock();
  setInterval(setClock, 1000);
</script>

</body>
</html>
