<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Monica's Pie - Vintage Clock</title>
<style>
  body {
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #fdfdfd;
    overflow: hidden;
  }
  svg {
    width: 100vw;
    height: auto;
    max-width: 550px;
    display: block;
  }
  text {
    font-family: "Bodoni Moda", serif;
    font-size: 55px;
    fill: black;
    text-anchor: middle;
    dominant-baseline: central;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400&display=swap" rel="stylesheet">
</head>
<body>
<svg viewBox="0 0 600 520">
  <g id="numbers"></g>
  <g id="markers"></g>

  <!--
    FIX: Wrap each hand in a <g> and rotate the <g> using SVG's native
    rotate(angle, cx, cy) — far more reliable than CSS transform-origin on <image>.

    The pivot of each hand (the ornate center circle) is NOT at the very
    bottom of its SVG file — it sits at approximately:
      • Big hand   (336×2292): 84.9% from top → pivot_ratio ≈ 0.849
      • Small hand (368×1024): 89.8% from top → pivot_ratio ≈ 0.898

    Given clock center = (300, 260), for a displayed height H:
      y_image  = centerY  − pivot_ratio × H
      width    = (svgW / svgH) × H
      x_image  = centerX  − width / 2
  -->

  <!-- Hour hand  — H=150  → x=273, y=125, w=54 -->
  <g id="hour">
    <image href="Small clock hand.svg"
           x="273" y="125" width="54" height="150"
           preserveAspectRatio="xMidYMid meet"
           style="mix-blend-mode: multiply;"/>
  </g>

  <!-- Minute hand — H=230  → x=283, y=65,  w=34 -->
  <g id="minute">
    <image href="Big clock hand.svg"
           x="279" y="40" width="34" height="230"
           preserveAspectRatio="xMidYMid meet"
           style="mix-blend-mode: multiply;"/>
  </g>

  <!-- Center cap -->
  <circle cx="300" cy="260" r="7" fill="black"/>
</svg>

<script>
  /* ── dial: numbers + diamond markers ───────────────────────── */
  const romans   = ["XII","I","II","III","IV","V","VI","VII","VIII","IX","X","XI"];
  const centerX  = 300, centerY = 260, radius = 210;
  const numGroup = document.getElementById("numbers");
  const markGroup= document.getElementById("markers");

  romans.forEach((num, i) => {
    const angleDeg = i * 30;
    const angleRad = (angleDeg - 90) * Math.PI / 180;
    const x = centerX + radius * Math.cos(angleRad);
    const y = centerY + radius * Math.sin(angleRad);

    const text = document.createElementNS("http://www.w3.org/2000/svg","text");
    text.setAttribute("x", x);
    text.setAttribute("y", y);
    text.style.transformOrigin = `${x}px ${y}px`;
    text.style.transform = `rotate(${angleDeg}deg) scaleY(1.4)`;
    text.textContent = num;
    numGroup.appendChild(text);

    const mAngleDeg = angleDeg + 15;
    const mAngleRad = (mAngleDeg - 90) * Math.PI / 180;
    const mx = centerX + radius * Math.cos(mAngleRad);
    const my = centerY + radius * Math.sin(mAngleRad);
    const diamond = document.createElementNS("http://www.w3.org/2000/svg","polygon");
    diamond.setAttribute("points","0,-14 3.5,0 0,14 -3.5,0");
    diamond.setAttribute("transform",`translate(${mx},${my}) rotate(${mAngleDeg})`);
    diamond.setAttribute("fill","black");
    markGroup.appendChild(diamond);
  });

  /* ── clock tick ─────────────────────────────────────────────── */
  function updateClock() {
    const now = new Date();
    const sec = now.getSeconds();
    const min = now.getMinutes();
    const hr  = now.getHours();

    const minDeg = min * 6  + sec * 0.1;
    const hrDeg  = (hr % 12) * 30 + min * 0.5;

    /* SVG-native rotate(angle, cx, cy) — no CSS transform-origin needed */
    document.getElementById("minute")
            .setAttribute("transform", `rotate(${minDeg},300,260)`);
    document.getElementById("hour")
            .setAttribute("transform", `rotate(${hrDeg},300,260)`);
  }

  setInterval(updateClock, 1000);
  updateClock();
</script>
</body>
</html>
