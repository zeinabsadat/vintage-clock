<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Elegant Clock with Markers</title>

<style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: white;
  margin: 0;
}

svg {
  width: 400px;
  height: 400px;
}

text {
  font-family: "Times New Roman", serif;
  font-size: 26px;
  fill: black;
  text-anchor: middle;
  dominant-baseline: middle;
}

.hand {
  transform-origin: 200px 200px;
}

.hour {
  fill: none;
  stroke: black;
  stroke-width: 3;
  stroke-linecap: round;
}

.minute {
  fill: none;
  stroke: black;
  stroke-width: 2;
  stroke-linecap: round;
}

.second {
  stroke: red;
  stroke-width: 1.5;
}

.center {
  fill: black;
}

.marker {
  fill: black;
}
</style>
</head>

<body>

<svg viewBox="0 0 400 400">

  <!-- Center dot -->
  <circle cx="200" cy="200" r="4" class="center"/>

  <!-- Roman Numbers -->
  <g id="numbers"></g>

  <!-- Markers (trapezoid / diamond between numbers) -->
  <g id="markers"></g>

  <!-- Elegant Hour Hand -->
  <path id="hour" class="hand hour"
  d="M200 200
     C195 185, 195 170, 200 160
     C205 170, 205 185, 200 200
     M200 160 L200 135" />

  <!-- Elegant Minute Hand -->
  <path id="minute" class="hand minute"
  d="M200 200
     C193 175, 193 140, 200 120
     C207 140, 207 175, 200 200
     M200 120 L200 90" />

  <!-- Thin Second Hand -->
  <line id="second" class="hand second" x1="200" y1="200" x2="200" y2="80"/>
</svg>

<script>
// 12 Roman numbers
const romans = ["XII","I","II","III","IV","V","VI","VII","VIII","IX","X","XI"];
const radius = 160;
const centerX = 200;
const centerY = 200;

const group = document.getElementById("numbers");
romans.forEach((num, i) => {
  const angle = (i * 30 - 90) * Math.PI / 180;
  const x = centerX + radius * Math.cos(angle);
  const y = centerY + radius * Math.sin(angle);

  const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
  text.setAttribute("x", x);
  text.setAttribute("y", y);
  text.textContent = num;

  group.appendChild(text);
});

// Markers between numbers
const markerGroup = document.getElementById("markers");
const markerRadius = 180; // فاصله از مرکز
const markerSize = 5;     // سایز ذوزنقه / مربع
for (let i = 0; i < 60; i++) {
  // Skip the exact positions of Roman numbers
  if (i % 5 === 0) continue;

  const angle = (i * 6 - 90) * Math.PI / 180;
  const x = centerX + markerRadius * Math.cos(angle);
  const y = centerY + markerRadius * Math.sin(angle);

  const polygon = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
  const dx = markerSize * Math.cos(angle + Math.PI/2);
  const dy = markerSize * Math.sin(angle + Math.PI/2);
  polygon.setAttribute("points", `
    ${x - dx},${y - dy}
    ${x + dx},${y + dy}
    ${x + dx*0.5},${y + dy*0.5}
    ${x - dx*0.5},${y - dy*0.5}
  `);
  polygon.classList.add("marker");
  markerGroup.appendChild(polygon);
}

// Clock rotation
function updateClock() {
  const now = new Date();

  const sec = now.getSeconds();
  const min = now.getMinutes();
  const hr = now.getHours();

  const secDeg = sec * 6;
  const minDeg = min * 6 + sec * 0.1;
  const hrDeg = (hr % 12) * 30 + min * 0.5;

  document.getElementById("second").style.transform = `rotate(${secDeg}deg)`;
  document.getElementById("minute").style.transform = `rotate(${minDeg}deg)`;
  document.getElementById("hour").style.transform = `rotate(${hrDeg}deg)`;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
