<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Elegant Clock with Large Numbers</title>

<style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: white;
  margin: 0;
}

svg {
  width: 500px;
  height: 500px;
}

text {
  font-family: "Times New Roman", serif;
  font-size: 42px; /* Increased font size */
  fill: black;
  text-anchor: middle;
  dominant-baseline: middle;
  font-weight: bold;
}

.hand {
  transform-origin: 250px 250px;
}

.hour {
  fill: none;
  stroke: black;
  stroke-width: 5;
  stroke-linecap: round;
}

.minute {
  fill: none;
  stroke: black;
  stroke-width: 3.5;
  stroke-linecap: round;
}

.second {
  stroke: black;
  stroke-width: 1.5;
}

.center {
  fill: black;
}

.marker {
  fill: black;
}
</style>
</head>

<body>

<svg viewBox="0 0 500 500">
  <circle cx="250" cy="250" r="6" class="center"/>

  <g id="numbers"></g>
  <g id="markers"></g>

  <path id="hour" class="hand hour"
  d="M250 250
     C245 235, 245 220, 250 210
     C255 220, 255 235, 250 250
     M250 210 L250 170" />

  <path id="minute" class="hand minute"
  d="M250 250
     C243 225, 243 190, 250 170
     C257 190, 257 225, 250 250
     M250 170 L250 120" />

  <line id="second" class="hand second" x1="250" y1="250" x2="250" y2="100"/>
</svg>

<script>
const romans = ["XII","I","II","III","IV","V","VI","VII","VIII","IX","X","XI"];
const radius = 190; 
const centerX = 250;
const centerY = 250;

const group = document.getElementById("numbers");
romans.forEach((num, i) => {
  const angle = (i * 30 - 90) * Math.PI / 180;
  const x = centerX + radius * Math.cos(angle);
  const y = centerY + radius * Math.sin(angle);

  const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
  text.setAttribute("x", x);
  text.setAttribute("y", y);
  text.textContent = num;

  group.appendChild(text);
});

const markerGroup = document.getElementById("markers");
const markerRadius = 200; 
const dW = 7; 
const dH = 12;

for (let i = 0; i < 12; i++) {
  const angle = (i * 30 - 75) * Math.PI / 180;
  const x = centerX + markerRadius * Math.cos(angle);
  const y = centerY + markerRadius * Math.sin(angle);

  const polygon = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
  
  const p1 = `${x},${y - dH}`;
  const p2 = `${x + dW},${y}`;
  const p3 = `${x},${y + dH}`;
  const p4 = `${x - dW},${y}`;
  
  polygon.setAttribute("points", `${p1} ${p2} ${p3} ${p4}`);
  polygon.classList.add("marker");
  markerGroup.appendChild(polygon);
}

function updateClock() {
  const now = new Date();
  const sec = now.getSeconds();
  const min = now.getMinutes();
  const hr = now.getHours();

  const secDeg = sec * 6;
  const minDeg = min * 6 + sec * 0.1;
  const hrDeg = (hr % 12) * 30 + min * 0.5;

  document.getElementById("second").style.transform = `rotate(${secDeg}deg)`;
  document.getElementById("minute").style.transform = `rotate(${minDeg}deg)`;
  document.getElementById("hour").style.transform = `rotate(${hrDeg}deg)`;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
