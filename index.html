<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Full Clock</title>

<style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #eee;
  margin: 0;
}

svg {
  width: 400px;
  height: 400px;
}

text {
  font-family: "Times New Roman", serif;
  font-size: 26px;
  fill: black;
  text-anchor: middle;
  dominant-baseline: middle;
}

.hand {
  transform-origin: 200px 200px;
}

.hour { stroke: black; stroke-width: 5; stroke-linecap: round; }
.minute { stroke: black; stroke-width: 3; stroke-linecap: round; }
.second { stroke: red; stroke-width: 2; }

</style>
</head>

<body>

<svg viewBox="0 0 400 400">

  <!-- Center -->
  <circle cx="200" cy="200" r="5" fill="black"/>

  <!-- Roman Numbers -->
  <g id="numbers"></g>

  <!-- Hands -->
  <line id="hour" class="hand hour" x1="200" y1="200" x2="200" y2="140"/>
  <line id="minute" class="hand minute" x1="200" y1="200" x2="200" y2="100"/>
  <line id="second" class="hand second" x1="200" y1="200" x2="200" y2="80"/>

</svg>

<script>
const romans = ["XII","I","II","III","IV","V","VI","VII","VIII","IX","X","XI"];
const radius = 160;
const centerX = 200;
const centerY = 200;

const group = document.getElementById("numbers");

romans.forEach((num, i) => {
  const angle = (i * 30 - 90) * Math.PI / 180;
  const x = centerX + radius * Math.cos(angle);
  const y = centerY + radius * Math.sin(angle);

  const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
  text.setAttribute("x", x);
  text.setAttribute("y", y);
  text.textContent = num;

  group.appendChild(text);
});

function updateClock() {
  const now = new Date();

  const sec = now.getSeconds();
  const min = now.getMinutes();
  const hr = now.getHours();

  const secDeg = sec * 6;
  const minDeg = min * 6 + sec * 0.1;
  const hrDeg = (hr % 12) * 30 + min * 0.5;

  document.getElementById("second").style.transform = `rotate(${secDeg}deg)`;
  document.getElementById("minute").style.transform = `rotate(${minDeg}deg)`;
  document.getElementById("hour").style.transform = `rotate(${hrDeg}deg)`;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
