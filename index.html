<!DOCTYPE html>
<html lang="fa" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roman Clock</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f0f0f0;
    }

    .clock {
      position: relative;
      width: 400px;
      height: 400px;
      background: white;
      border: 18px solid #1a1a1a;
      border-radius: 50%;
      box-shadow: 0 0 30px rgba(0,0,0,0.4);
    }

    .number {
      position: absolute;
      font-size: 32px;
      font-weight: bold;
      color: #1a1a1a;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .hand {
      position: absolute;
      left: 50%;
      bottom: 50%;
      transform-origin: bottom center;
      border-radius: 50px;
      transition: transform 0.05s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .hour-hand {
      width: 8px;
      height: 110px;
      background: #1a1a1a;
      margin-left: -4px;
      z-index: 3;
    }

    .minute-hand {
      width: 6px;
      height: 150px;
      background: #333;
      margin-left: -3px;
      z-index: 4;
    }

    .second-hand {
      width: 3px;
      height: 160px;
      background: #e74c3c;
      margin-left: -1.5px;
      z-index: 5;
    }

    .center-dot {
      position: absolute;
      width: 20px;
      height: 20px;
      background: #1a1a1a;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    .num12 { top: 25px; left: 50%; transform: translateX(-50%); }
    .num1  { top: 65px; right: 70px; }
    .num2  { top: 130px; right: 35px; }
    .num3  { top: 50%; right: 20px; transform: translateY(-50%); }
    .num4  { bottom: 130px; right: 35px; }
    .num5  { bottom: 65px; right: 70px; }
    .num6  { bottom: 25px; left: 50%; transform: translateX(-50%); }
    .num7  { bottom: 65px; left: 70px; }
    .num8  { bottom: 130px; left: 35px; }
    .num9  { top: 50%; left: 20px; transform: translateY(-50%); }
    .num10 { top: 130px; left: 35px; }
    .num11 { top: 65px; left: 70px; }
  </style>
</head>
<body>

  <div class="clock" id="clock">
    <div class="number num12">XII</div>
    <div class="number num1">I</div>
    <div class="number num2">II</div>
    <div class="number num3">III</div>
    <div class="number num4">IV</div>
    <div class="number num5">V</div>
    <div class="number num6">VI</div>
    <div class="number num7">VII</div>
    <div class="number num8">VIII</div>
    <div class="number num9">IX</div>
    <div class="number num10">X</div>
    <div class="number num11">XI</div>

    <div class="hand hour-hand" id="hour"></div>
    <div class="hand minute-hand" id="minute"></div>
    <div class="hand second-hand" id="second"></div>
    <div class="center-dot"></div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();

      const seconds = now.getSeconds();
      const minutes = now.getMinutes();
      const hours = now.getHours();

      const secondDeg = (seconds * 6);
      const minuteDeg = (minutes * 6) + (seconds * 0.1);
      const hourDeg   = (hours % 12 * 30) + (minutes * 0.5);

      document.getElementById('second').style.transform = `rotate(${secondDeg}deg)`;
      document.getElementById('minute').style.transform = `rotate(${minuteDeg}deg)`;
      document.getElementById('hour').style.transform   = `rotate(${hourDeg}deg)`;
    }

    setInterval(updateClock, 1000);
    updateClock();
  </script>

</body>
</html>
