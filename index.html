<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clean Roman Clock with Condensed Font</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

<style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: white;
  margin: 0;
}

svg {
  width: 500px;
  height: 500px;
}

text {
  /* Retaining the condensed, elegant Playfair Display font */
  font-family: "Playfair Display", serif;
  font-size: 55px; /* Slightly larger for a bold presence */
  font-weight: 300; /* Light weight for the "thin" look */
  text-transform: uppercase;
  letter-spacing: -2px; /* Condensed letter-spacing */
  fill: black;
  text-anchor: middle;
  dominant-baseline: middle;
}

.hand {
  transform-origin: 250px 250px;
}

.hour {
  fill: none;
  stroke: black;
  stroke-width: 5;
  stroke-linecap: round;
}

.minute {
  fill: none;
  stroke: black;
  stroke-width: 3.5;
  stroke-linecap: round;
}

.second {
  stroke: black;
  stroke-width: 1.5;
}

.center {
  fill: black;
}
</style>
</head>

<body>

<svg viewBox="0 0 500 500">
  <circle cx="250" cy="250" r="6" class="center"/>

  <g id="numbers"></g>

  <path id="hour" class="hand hour"
  d="M250 250
     C245 235, 245 220, 250 210
     C255 220, 255 235, 250 250
     M250 210 L250 170" />

  <path id="minute" class="hand minute"
  d="M250 250
     C243 225, 243 190, 250 170
     C257 190, 257 225, 250 250
     M250 170 L250 120" />

  <line id="second" class="hand second" x1="250" y1="250" x2="250" y2="100"/>
</svg>

<script>
const romans = ["XII","I","II","III","IV","V","VI","VII","VIII","IX","X","XI"];
const centerX = 250;
const centerY = 250;
const radius = 205; // Set the radius for the numbers

const group = document.getElementById("numbers");
romans.forEach((num, i) => {
  // Angle calculated correctly, numbers placed, all-at-once
  const angle = (i * 30 - 90) * Math.PI / 180;
  const x = centerX + radius * Math.cos(angle);
  const y = centerY + radius * Math.sin(angle);

  const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
  text.setAttribute("x", x);
  text.setAttribute("y", y);
  text.textContent = num;

  group.appendChild(text);
});

// Markers (Diamonds) have been entirely removed.

function updateClock() {
  const now = new Date();
  const sec = now.getSeconds();
  const min = now.getMinutes();
  const hr = now.getHours();

  const secDeg = sec * 6;
  const minDeg = min * 6 + sec * 0.1;
  const hrDeg = (hr % 12) * 30 + min * 0.5;

  document.getElementById("second").style.transform = `rotate(${secDeg}deg)`;
  document.getElementById("minute").style.transform = `rotate(${minDeg}deg)`;
  document.getElementById("hour").style.transform = `rotate(${hrDeg}deg)`;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
