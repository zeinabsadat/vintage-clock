<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body {
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: flex-start; 
    background: transparent;
    overflow: hidden;
  }

  svg {
    width: 100vw;
    height: auto;
    max-width: 550px;
    display: block;
  }

  text {
    font-family: "Bodoni Moda", serif;
    font-size: 55px; 
    fill: black;
    text-anchor: middle;
    dominant-baseline: central;
  }

  .hand {
    transform-origin: 300px 260px; 
    fill: black;
    stroke: black;
    stroke-width: 0.2;
  }

  .second { stroke-width: 1.2; fill: none; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400&display=swap" rel="stylesheet">
</head>
<body>

<svg viewBox="0 0 600 520">
  <g id="numbers"></g>
  <g id="markers"></g>

  <g id="hour" class="hand">
    <path d="M300 260 
             C292 258, 286 245, 286 230 
             C286 210, 300 195, 300 180 
             C300 195, 314 210, 314 230 
             C314 245, 308 258, 300 260 Z" />
    <path d="M300 180 L300 145" stroke-width="2.5" />
  </g>

  <g id="minute" class="hand">
    <path d="M300 260 
             C295 258, 290 245, 290 225 
             C290 200, 300 180, 300 160 
             C300 180, 310 200, 310 225 
             C310 245, 305 258, 300 260 Z" />
    <path d="M300 160 L300 70" stroke-width="2" />
  </g>

  <line id="second" class="hand second" x1="300" y1="260" x2="300" y2="45"/>
  <circle cx="300" cy="260" r="5" fill="black"/>
</svg>

<script>
  const romans = ["XII","I","II","III","IV","V","VI","VII","VIII","IX","X","XI"];
  const centerX = 300;
  const centerY = 260; 
  const radius = 210; 

  const numGroup = document.getElementById("numbers");
  const markGroup = document.getElementById("markers");

  romans.forEach((num, i) => {
    const angleDeg = i * 30; 
    const angleRad = (angleDeg - 90) * Math.PI / 180; 
    const x = centerX + radius * Math.cos(angleRad);
    const y = centerY + radius * Math.sin(angleRad);

    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
    text.setAttribute("x", x);
    text.setAttribute("y", y);
    text.style.transformOrigin = `${x}px ${y}px`;
    text.style.transform = `rotate(${angleDeg}deg) scaleY(1.4)`;
    
    text.textContent = num;
    numGroup.appendChild(text);

   
    const mAngleDeg = angleDeg + 15;
    const mAngleRad = (mAngleDeg - 90) * Math.PI / 180;
    const mx = centerX + radius * Math.cos(mAngleRad);
    const my = centerY + radius * Math.sin(mAngleRad);

    const diamond = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
    diamond.setAttribute("points", "0,-14 3.5,0 0,14 -3.5,0");
    diamond.setAttribute("transform", `translate(${mx}, ${my}) rotate(${mAngleDeg})`);
    diamond.setAttribute("fill", "black");
    markGroup.appendChild(diamond);
  });

  function updateClock() {
    const now = new Date();
    const sec = now.getSeconds();
    const min = now.getMinutes();
    const hr = now.getHours();

    document.getElementById("second").style.transform = `rotate(${sec * 6}deg)`;
    document.getElementById("minute").style.transform = `rotate(${min * 6 + sec * 0.1}deg)`;
    document.getElementById("hour").style.transform = `rotate(${(hr % 12) * 30 + min * 0.5}deg)`;
  }

  setInterval(updateClock, 1000);
  updateClock();
</script>
</body>
</html>
