<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Classic SVG Clock</title>

<style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #eee;
  margin: 0;
}

svg {
  width: 400px;
  height: 400px;
}

text {
  font-family: "Times New Roman", serif;
  font-size: 28px;
  fill: black;
}

.hand {
  transform-origin: 200px 200px;
  transform: rotate(0deg);
}

.hour {
  stroke: black;
  stroke-width: 5;
  stroke-linecap: round;
}

.minute {
  stroke: black;
  stroke-width: 3;
  stroke-linecap: round;
}

.second {
  stroke: red;
  stroke-width: 2;
}

</style>
</head>

<body>

<svg viewBox="0 0 400 400">

  <!-- Center -->
  <circle cx="200" cy="200" r="5" fill="black"/>

  <!-- Roman Numbers -->
  <g text-anchor="middle">
    <text x="200" y="40">XII</text>
    <text x="300" y="80">I</text>
    <text x="350" y="200">II</text>
    <text x="300" y="320">III</text>
    <text x="200" y="370">VI</text>
    <text x="100" y="320">VII</text>
    <text x="50" y="200">IX</text>
    <text x="100" y="80">XI</text>
  </g>

  <!-- Decorative ticks -->
  <g stroke="black">
    <line x1="200" y1="60" x2="200" y2="80"/>
    <line x1="300" y1="100" x2="285" y2="115"/>
    <line x1="340" y1="200" x2="320" y2="200"/>
    <line x1="300" y1="300" x2="285" y2="285"/>
    <line x1="200" y1="340" x2="200" y2="320"/>
    <line x1="100" y1="300" x2="115" y2="285"/>
    <line x1="60" y1="200" x2="80" y2="200"/>
    <line x1="100" y1="100" x2="115" y2="115"/>
  </g>

  <!-- Hands -->
  <line id="hour" class="hand hour" x1="200" y1="200" x2="200" y2="140"/>
  <line id="minute" class="hand minute" x1="200" y1="200" x2="200" y2="100"/>
  <line id="second" class="hand second" x1="200" y1="200" x2="200" y2="80"/>

</svg>

<script>
function updateClock() {
  const now = new Date();

  const sec = now.getSeconds();
  const min = now.getMinutes();
  const hr = now.getHours();

  const secDeg = sec * 6;
  const minDeg = min * 6 + sec * 0.1;
  const hrDeg = (hr % 12) * 30 + min * 0.5;

  document.getElementById("second").style.transform =
    `rotate(${secDeg}deg)`;

  document.getElementById("minute").style.transform =
    `rotate(${minDeg}deg)`;

  document.getElementById("hour").style.transform =
    `rotate(${hrDeg}deg)`;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
