<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Monica's Pie - Vintage Clock</title>
<style>
  body {
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center; 
    height: 100vh;
    background-color: #fdfdfd;
  }

  svg {
    width: 100vw;
    height: auto;
    max-width: 550px;
  }

  text {
    font-family: "Bodoni Moda", serif;
    font-size: 55px; 
    fill: black;
    text-anchor: middle;
    dominant-baseline: central;
  }

  .hand {
    /* تنظیم نقطه چرخش برای تمام عقربه‌ها بر اساس مرکز ساعت */
    transform-origin: 300px 260px;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400&display=swap" rel="stylesheet">
</head>
<body>

<svg viewBox="0 0 600 520">
  <g id="numbers"></g>
  <g id="markers"></g>

  <image id="hour" class="hand" href="Small clock hand.svg" x="275" y="60" width="50" height="200" />
  <image id="minute" class="hand" href="Big clock hand.svg" x="270" y="60" width="60" height="230" />

  <circle cx="300" cy="260" r="7" fill="black"/>
</svg>

<script>
  const romans = ["XII","I","II","III","IV","V","VI","VII","VIII","IX","X","XI"];
  const centerX = 300;
  const centerY = 260; 
  const radius = 210; 

  const numGroup = document.getElementById("numbers");
  const markGroup = document.getElementById("markers");

  romans.forEach((num, i) => {
    const angleDeg = i * 30; 
    const angleRad = (angleDeg - 90) * Math.PI / 180; 
    const x = centerX + radius * Math.cos(angleRad);
    const y = centerY + radius * Math.sin(angleRad);

    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
    text.setAttribute("x", x);
    text.setAttribute("y", y);
    text.textContent = num;
    numGroup.appendChild(text);
    
    const mAngleDeg = angleDeg + 15;
    const mAngleRad = (mAngleDeg - 90) * Math.PI / 180;
    const mx = centerX + radius * Math.cos(mAngleRad);
    const my = centerY + radius * Math.sin(mAngleRad);

    const diamond = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
    diamond.setAttribute("points", "0,-14 3.5,0 0,14 -3.5,0");
    diamond.setAttribute("transform", `translate(${mx}, ${my}) rotate(${mAngleDeg})`);
    diamond.setAttribute("fill", "black");
    markGroup.appendChild(diamond);
  });

  function updateClock() {
    const now = new Date();
    const sec = now.getSeconds();
    const min = now.getMinutes();
    const hr = now.getHours();

    // محاسبه زاویه چرخش عقربه‌ها
    const minDeg = min * 6 + sec * 0.1;
    const hrDeg = (hr % 12) * 30 + min * 0.5;

    document.getElementById("minute").style.transform = `rotate(${minDeg}deg)`;
    document.getElementById("hour").style.transform = `rotate(${hrDeg}deg)`;
  }

  setInterval(updateClock, 1000);
  updateClock();
</script>
</body>
</html>
