<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Classic Roman Clock with Diamonds</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&display=swap" rel="stylesheet">

<style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: white;
  margin: 0;
}

svg {
  width: 600px;
  height: 600px;
}

text {
  font-family: "Bodoni Moda", serif;
  font-size: 55px; 
  font-weight: 400;
  fill: black;
  text-anchor: middle;
  dominant-baseline: central;
}

.marker {
  fill: black;
}

.hand {
  transform-origin: 300px 300px;
  fill: none;
  stroke: black;
  stroke-linecap: round;
}

.hour { stroke-width: 3.5; }
.minute { stroke-width: 2.5; }
.second { stroke: black; stroke-width: 1.2; }
.center { fill: black; }
</style>
</head>

<body>

<svg viewBox="0 0 600 600">
  <circle cx="300" cy="300" r="5" class="center"/>

  <g id="numbers"></g>
  <g id="markers"></g>

  <path id="hour" class="hand hour" d="M300 300 L300 210" />
  <path id="minute" class="hand minute" d="M300 300 L300 145" />
  <line id="second" class="hand second" x1="300" y1="300" x2="300" y2="110"/>
</svg>

<script>
const romans = ["XII","I","II","III","IV","V","VI","VII","VIII","IX","X","XI"];
const centerX = 300;
const centerY = 300;
const radiusNumbers = 230; 
const radiusMarkers = 230; 

const numGroup = document.getElementById("numbers");
const markGroup = document.getElementById("markers");

romans.forEach((num, i) => {
  // --- Position and Rotate Numbers ---
  const angleDeg = i * 30; 
  const angleRad = (angleDeg - 90) * Math.PI / 180; 
  
  const xNum = centerX + radiusNumbers * Math.cos(angleRad);
  const yNum = centerY + radiusNumbers * Math.sin(angleRad);

  const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
  text.setAttribute("transform", `translate(${xNum}, ${yNum}) rotate(${angleDeg})`);
  text.textContent = num;
  numGroup.appendChild(text);

  // --- Position and Rotate Diamond Markers (Between numbers) ---
  const markAngleDeg = angleDeg + 15; // Offset by 15 degrees to be between numbers
  const markAngleRad = (markAngleDeg - 90) * Math.PI / 180;

  const xMark = centerX + radiusMarkers * Math.cos(markAngleRad);
  const yMark = centerY + radiusMarkers * Math.sin(markAngleRad);

  // Create thin diamond (rhombus)
  const diamond = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
  const w = 4;  // Half width (thin)
  const h = 12; // Half height (long)
  
  // Points for a vertical diamond, then we rotate it
  const points = `0,${-h} ${w},0 0,${h} ${-w},0`;
  diamond.setAttribute("points", points);
  diamond.setAttribute("class", "marker");
  diamond.setAttribute("transform", `translate(${xMark}, ${yMark}) rotate(${markAngleDeg})`);
  
  markGroup.appendChild(diamond);
});

function updateClock() {
  const now = new Date();
  const sec = now.getSeconds();
  const min = now.getMinutes();
  const hr = now.getHours();

  const secDeg = sec * 6;
  const minDeg = min * 6 + sec * 0.1;
  const hrDeg = (hr % 12) * 30 + min * 0.5;

  document.getElementById("second").style.transform = `rotate(${secDeg}deg)`;
  document.getElementById("minute").style.transform = `rotate(${minDeg}deg)`;
  document.getElementById("hour").style.transform = `rotate(${hrDeg}deg)`;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
