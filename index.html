<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Antique Pocket Watch</title>
    <style>
        body {
            background-color: #F5F0E8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Case of the watch with metallic gold effect */
        .watch-case {
            width: 380px;
            height: 380px;
            border-radius: 50%;
            background: linear-gradient(145deg, #e6c619, #c4a882, #856d4d);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 
                0 20px 50px rgba(0,0,0,0.4),
                inset 0 -8px 15px rgba(0,0,0,0.3),
                inset 0 8px 15px rgba(255,255,255,0.4);
            position: relative;
        }

        /* The winding knob at the top */
        .knob {
            position: absolute;
            top: -45px;
            width: 40px;
            height: 30px;
            background: #c4a882;
            border-radius: 5px;
            border: 2px solid #856d4d;
            z-index: -1;
        }

        .ring {
            position: absolute;
            top: -85px;
            width: 60px;
            height: 60px;
            border: 8px solid #c4a882;
            border-radius: 50%;
            z-index: -2;
        }

        /* Inner clock face with aged parchment look */
        .face {
            width: 310px;
            height: 310px;
            background: radial-gradient(circle, #fffdf5 0%, #e8dec0 100%);
            border-radius: 50%;
            border: 4px solid #4A6741; /* Sage Green Accent */
            position: relative;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.2);
        }

        /* Classic Roman or Serif Numbers */
        .number {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            font-family: 'Georgia', serif;
            font-size: 32px;
            font-weight: bold;
            color: #3e2723;
            padding: 15px;
            box-sizing: border-box;
        }

        /* Precise positioning of numbers */
        .n1 { transform: rotate(30deg); } .n1 span { display: block; transform: rotate(-30deg); }
        .n2 { transform: rotate(60deg); } .n2 span { display: block; transform: rotate(-60deg); }
        .n3 { transform: rotate(90deg); } .n3 span { display: block; transform: rotate(-90deg); }
        .n4 { transform: rotate(120deg); } .n4 span { display: block; transform: rotate(-120deg); }
        .n5 { transform: rotate(150deg); } .n5 span { display: block; transform: rotate(-150deg); }
        .n6 { transform: rotate(180deg); } .n6 span { display: block; transform: rotate(-180deg); }
        .n7 { transform: rotate(210deg); } .n7 span { display: block; transform: rotate(-210deg); }
        .n8 { transform: rotate(240deg); } .n8 span { display: block; transform: rotate(-240deg); }
        .n9 { transform: rotate(270deg); } .n9 span { display: block; transform: rotate(-270deg); }
        .n10 { transform: rotate(300deg); } .n10 span { display: block; transform: rotate(-300deg); }
        .n11 { transform: rotate(330deg); } .n11 span { display: block; transform: rotate(-330deg); }
        .n12 { transform: rotate(0deg); } .n12 span { display: block; transform: rotate(0deg); }

        /* Hands with ornate style */
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            background: #2c1e14;
            border-radius: 50% 50% 0 0;
        }

        .hour-hand {
            width: 10px;
            height: 75px;
            margin-left: -5px;
            z-index: 3;
        }

        /* Diamond shape for hour hand tip */
        .hour-hand::after {
            content: '';
            position: absolute;
            top: 5px;
            left: -5px;
            width: 20px;
            height: 20px;
            background: #2c1e14;
            transform: rotate(45deg);
        }

        .minute-hand {
            width: 6px;
            height: 115px;
            margin-left: -3px;
            z-index: 2;
        }

        .second-hand {
            width: 2px;
            height: 135px;
            margin-left: -1px;
            background: #8b0000;
            z-index: 4;
        }

        .pivot {
            width: 16px;
            height: 16px;
            background: #2c1e14;
            border: 2px solid #c4a882;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }
    </style>
</head>
<body>

<div class="watch-case">
    <div class="knob"></div>
    <div class="ring"></div>
    <div class="face">
        <div class="pivot"></div>
        
        <div class="hand hour-hand" id="hour"></div>
        <div class="hand minute-hand" id="minute"></div>
        <div class="hand second-hand" id="second"></div>

        <div class="number n1"><span>1</span></div>
        <div class="number n2"><span>2</span></div>
        <div class="number n3"><span>3</span></div>
        <div class="number n4"><span>4</span></div>
        <div class="number n5"><span>5</span></div>
        <div class="number n6"><span>6</span></div>
        <div class="number n7"><span>7</span></div>
        <div class="number n8"><span>8</span></div>
        <div class="number n9"><span>9</span></div>
        <div class="number n10"><span>10</span></div>
        <div class="number n11"><span>11</span></div>
        <div class="number n12"><span>12</span></div>
    </div>
</div>

<script>
    function updateClock() {
        const now = new Date();
        const seconds = now.getSeconds();
        const minutes = now.getMinutes();
        const hours = now.getHours();

        const secondDeg = (seconds / 60) * 360;
        const minuteDeg = (minutes / 60) * 360 + (seconds / 60) * 6;
        const hourDeg = (hours / 12) * 360 + (minutes / 60) * 30;

        document.getElementById('second').style.transform = `rotate(${secondDeg}deg)`;
        document.getElementById('minute').style.transform = `rotate(${minuteDeg}deg)`;
        document.getElementById('hour').style.transform = `rotate(${hourDeg}deg)`;
    }

    setInterval(updateClock, 1000);
    updateClock();
</script>

</body>
</html>
