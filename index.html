<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Perfect Condensed Roman Clock</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Antonio:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: white;
  margin: 0;
}

svg {
  width: 600px;
  height: 600px;
}

text {
  font-family: 'Antonio', sans-serif;
  font-size: 70px; 
  fill: black;
  text-anchor: middle;
  dominant-baseline: middle;
  font-weight: 400;
}

.hand {
  transform-origin: 300px 300px;
  fill: none;
  stroke: black;
  stroke-linecap: round;
}

.hour { stroke-width: 4; }
.minute { stroke-width: 3; }
.second { stroke: black; stroke-width: 1.2; }
.center { fill: black; }
</style>
</head>

<body>

<svg viewBox="0 0 600 600">
  <circle cx="300" cy="300" r="6" class="center"/>

  <g id="numbers"></g>

  <path id="hour" class="hand hour" d="M300 300 L300 210" />
  <path id="minute" class="hand minute" d="M300 300 L300 140" />
  <line id="second" class="hand second" x1="300" y1="300" x2="300" y2="100"/>
</svg>

<script>
const romans = ["XII","I","II","III","IV","V","VI","VII","VIII","IX","X","XI"];
const centerX = 300;
const centerY = 300;
const radius = 230; 

const group = document.getElementById("numbers");

romans.forEach((num, i) => {
  const angleDeg = i * 30;
  const angleRad = (angleDeg - 90) * Math.PI / 180;
  
  const x = centerX + radius * Math.cos(angleRad);
  const y = centerY + radius * Math.sin(angleRad);

  const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
  text.textContent = num;
  
  // Clean translation and rotation around the calculated point
  text.setAttribute("transform", `translate(${x},${y}) rotate(${angleDeg})`);
  
  group.appendChild(text);
});

function updateClock() {
  const now = new Date();
  const sec = now.getSeconds();
  const min = now.getMinutes();
  const hr = now.getHours();

  const secDeg = sec * 6;
  const minDeg = min * 6 + sec * 0.1;
  const hrDeg = (hr % 12) * 30 + min * 0.5;

  document.getElementById("second").style.transform = `rotate(${secDeg}deg)`;
  document.getElementById("minute").style.transform = `rotate(${minDeg}deg)`;
  document.getElementById("hour").style.transform = `rotate(${hrDeg}deg)`;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
