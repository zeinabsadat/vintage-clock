<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultra Classic Roman Clock</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&display=swap" rel="stylesheet">

<style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: white;
  margin: 0;
}

svg {
  width: 600px;
  height: 600px;
}

text {
  font-family: "Bodoni Moda", serif;
  font-size: 65px; /* Large and readable */
  font-weight: 400;
  fill: black;
  text-anchor: middle;
  dominant-baseline: middle;
  /* Stretching slightly for that extra tall antique look */
  transform: scaleY(1.2);
}

.hand {
  transform-origin: 300px 300px;
}

.hour {
  fill: none;
  stroke: black;
  stroke-width: 6;
  stroke-linecap: round;
}

.minute {
  fill: none;
  stroke: black;
  stroke-width: 4;
  stroke-linecap: round;
}

.second {
  stroke: #222;
  stroke-width: 1.5;
}

.center {
  fill: black;
}
</style>
</head>

<body>

<svg viewBox="0 0 600 600">
  <circle cx="300" cy="300" r="7" class="center"/>

  <g id="numbers"></g>

  <path id="hour" class="hand hour"
  d="M300 300
     C295 280, 295 260, 300 250
     C305 260, 305 280, 300 300
     M300 250 L300 200" />

  <path id="minute" class="hand minute"
  d="M300 300
     C290 260, 290 220, 300 200
     C310 220, 310 260, 300 300
     M300 200 L300 130" />

  <line id="second" class="hand second" x1="300" y1="300" x2="300" y2="100"/>
</svg>

<script>
const romans = ["XII","I","II","III","IV","V","VI","VII","VIII","IX","X","XI"];
const centerX = 300;
const centerY = 300;
const radius = 240; // Balanced distance for large font

const group = document.getElementById("numbers");
romans.forEach((num, i) => {
  const angle = (i * 30 - 90) * Math.PI / 180;
  const x = centerX + radius * Math.cos(angle);
  const y = centerY + radius * Math.sin(angle);

  const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
  text.setAttribute("x", x);
  text.setAttribute("y", y);
  text.textContent = num;

  group.appendChild(text);
});

function updateClock() {
  const now = new Date();
  const sec = now.getSeconds();
  const min = now.getMinutes();
  const hr = now.getHours();

  const secDeg = sec * 6;
  const minDeg = min * 6 + sec * 0.1;
  const hrDeg = (hr % 12) * 30 + min * 0.5;

  document.getElementById("second").style.transform = `rotate(${secDeg}deg)`;
  document.getElementById("minute").style.transform = `rotate(${minDeg}deg)`;
  document.getElementById("hour").style.transform = `rotate(${hrDeg}deg)`;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
