<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Classic Spade Hand Clock</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400&display=swap" rel="stylesheet">

<style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: white;
  margin: 0;
}

svg {
  width: 600px;
  height: 600px;
}

text {
  font-family: "Bodoni Moda", serif;
  font-size: 50px; 
  font-weight: 400;
  fill: black;
  text-anchor: middle;
  dominant-baseline: central;
}

.marker {
  fill: black;
}

.hand {
  transform-origin: 300px 300px;
  fill: black;
  stroke: black;
  stroke-width: 0.5;
}

.second {
  stroke-width: 1.2;
  fill: none;
}

.center {
  fill: black;
}
</style>
</head>

<body>

<svg viewBox="0 0 600 600">
  <circle cx="300" cy="300" r="5" class="center"/>

  <g id="numbers"></g>
  <g id="markers"></g>

  <path id="hour" class="hand"
  d="M300 300
     L300 280 
     M300 280 C280 275, 280 250, 300 240 
     C320 250, 320 275, 300 280
     M300 240 L300 200" />

  <path id="minute" class="hand"
  d="M300 300 L300 285
     M300 285 C292 280, 292 265, 300 260
     C308 265, 308 280, 300 285
     M300 260 L300 135" />

  <line id="second" class="hand second" x1="300" y1="300" x2="300" y2="100"/>
</svg>

<script>
const romans = ["XII","I","II","III","IV","V","VI","VII","VIII","IX","X","XI"];
const centerX = 300;
const centerY = 300;
const radiusNumbers = 230; // Balances size and space for numbers

const group = document.getElementById("numbers");
romans.forEach((num, i) => {
  const angle = (i * 30 - 90) * Math.PI / 180;
  const x = centerX + radiusNumbers * Math.cos(angle);
  const y = centerY + radiusNumbers * Math.sin(angle);

  const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
  text.setAttribute("x", x);
  text.setAttribute("y", y);
  text.textContent = num;

  group.appendChild(text);
});

function updateClock() {
  const now = new Date();
  const sec = now.getSeconds();
  const min = now.getMinutes();
  const hr = now.getHours();

  const secDeg = sec * 6;
  const minDeg = min * 6 + sec * 0.1;
  const hrDeg = (hr % 12) * 30 + min * 0.5;

  document.getElementById("second").style.transform = `rotate(${secDeg}deg)`;
  document.getElementById("minute").style.transform = `rotate(${minDeg}deg)`;
  document.getElementById("hour").style.transform = `rotate(${hrDeg}deg)`;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
