<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vintage Pocket Clock</title>
    <style>
        body {
            background-color: #F5F0E8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            background-image: 
                radial-gradient(ellipse at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0.05) 100%),
                url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyCAMAAAAp4YyFAAABqlBMVEX///8zM/+AgP+AgIAAAADNzcxmZmYREQCAgIAAAAAA/wCAAID///8AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABvFk6fAAAAOnRSTlMAAQIDBAUGBwgJCgsMDQ4PEBESExQVFhcYGRobHB0eHyAhIiMkJSYnKCkqKywtLi8wMTIzNDU2Nzg5Ojs8PT5AP0BBQkNERUZHSElKVEB5XgAAAABJRU5ErkJggg==');
        }

        .frame {
            width: 400px;
            height: 400px;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #C4A882;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .clock {
            width: 320px;
            height: 320px;
            border: 12px solid #4A6741;
            border-radius: 50%;
            position: relative;
            background: radial-gradient(circle, #fffdf5 0%, #E8D6B5 100%);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15), inset 0 0 25px rgba(0,0,0,0.05);
        }

        .clock::before {
            content: '';
            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 50px;
            border: 8px solid #4A6741;
            border-radius: 50%;
        }

        .number {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            font-family: 'Times New Roman', serif;
            font-size: 30px;
            font-weight: bold;
            color: #4a3728;
            padding: 12px;
            box-sizing: border-box;
        }

        .n1 { transform: rotate(30deg); } .n1 span { display: block; transform: rotate(-30deg); }
        .n2 { transform: rotate(60deg); } .n2 span { display: block; transform: rotate(-60deg); }
        .n3 { transform: rotate(90deg); } .n3 span { display: block; transform: rotate(-90deg); }
        .n4 { transform: rotate(120deg); } .n4 span { display: block; transform: rotate(-120deg); }
        .n5 { transform: rotate(150deg); } .n5 span { display: block; transform: rotate(-150deg); }
        .n6 { transform: rotate(180deg); } .n6 span { display: block; transform: rotate(-180deg); }
        .n7 { transform: rotate(210deg); } .n7 span { display: block; transform: rotate(-210deg); }
        .n8 { transform: rotate(240deg); } .n8 span { display: block; transform: rotate(-240deg); }
        .n9 { transform: rotate(270deg); } .n9 span { display: block; transform: rotate(-270deg); }
        .n10 { transform: rotate(300deg); } .n10 span { display: block; transform: rotate(300deg); }
        .n11 { transform: rotate(330deg); } .n11 span { display: block; transform: rotate(-330deg); }
        .n12 { transform: rotate(0deg); } .n12 span { display: block; transform: rotate(0deg); }

        .center-dot {
            width: 14px;
            height: 14px;
            background: #2c1e14;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            background: #4A6741;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
        }

        .hour-hand {
            width: 8px;
            height: 80px;
            margin-left: -4px;
        }

        .minute-hand {
            width: 5px;
            height: 120px;
            margin-left: -2.5px;
        }

        .second-hand {
            width: 2px;
            height: 140px;
            margin-left: -1px;
            background: #8b0000;
        }
    </style>
</head>
<body>

<div class="frame">
    <div class="clock">
        <div class="center-dot"></div>
        
        <div class="hand hour-hand" id="hour"></div>
        <div class="hand minute-hand" id="minute"></div>
        <div class="hand second-hand" id="second"></div>

        <div class="number n1"><span>1</span></div>
        <div class="number n2"><span>2</span></div>
        <div class="number n3"><span>3</span></div>
        <div class="number n4"><span>4</span></div>
        <div class="number n5"><span>5</span></div>
        <div class="number n6"><span>6</span></div>
        <div class="number n7"><span>7</span></div>
        <div class="number n8"><span>8</span></div>
        <div class="number n9"><span>9</span></div>
        <div class="number n10"><span>10</span></div>
        <div class="number n11"><span>11</span></div>
        <div class="number n12"><span>12</span></div>
    </div>
</div>

<script>
    function updateClock() {
        const now = new Date();
        const seconds = now.getSeconds();
        const minutes = now.getMinutes();
        const hours = now.getHours();

        const secondDeg = (seconds / 60) * 360;
        const minuteDeg = (minutes / 60) * 360 + (seconds / 60) * 6;
        const hourDeg = (hours / 12) * 360 + (minutes / 60) * 30;

        document.getElementById('second').style.transform = `rotate(${secondDeg}deg)`;
        document.getElementById('minute').style.transform = `rotate(${minuteDeg}deg)`;
        document.getElementById('hour').style.transform = `rotate(${hourDeg}deg)`;
    }

    setInterval(updateClock, 1000);
    updateClock();
</script>

</body>
</html>
