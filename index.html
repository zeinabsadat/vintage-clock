<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Classic Roman Clock with Fancy Hands</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&display=swap" rel="stylesheet">

<style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: white;
  margin: 0;
}

svg {
  width: 600px;
  height: 600px;
}

text {
  font-family: "Bodoni Moda", serif;
  font-size: 55px; 
  font-weight: 400;
  fill: black;
  text-anchor: middle;
  dominant-baseline: central;
}

.marker {
  fill: black;
}

.hand {
  transform-origin: 300px 300px;
  fill: black;
  stroke: black;
  stroke-width: 1;
}

.second {
  stroke-width: 1.5;
  fill: none;
}

.center {
  fill: black;
}
</style>
</head>

<body>

<svg viewBox="0 0 600 600">
  <circle cx="300" cy="300" r="6" class="center"/>

  <g id="numbers"></g>
  <g id="markers"></g>

  <g id="hour" class="hand">
    <path d="M300 300 L300 280 
             M300 280 C285 275, 285 260, 300 255 
             C315 260, 315 275, 300 280
             M300 255 L300 190 
             L305 195 L300 180 L295 195 L300 190" />
    <circle cx="300" cy="267" r="4" fill="white" stroke="black" stroke-width="1.5"/>
  </g>

  <g id="minute" class="hand">
    <path d="M300 300 L300 285
             M300 285 C290 280, 290 270, 300 265
             C310 270, 310 280, 300 285
             M300 265 L300 130 
             L304 135 L300 115 L296 135 L300 130" />
  </g>

  <line id="second" class="hand second" x1="300" y1="300" x2="300" y2="90"/>
</svg>

<script>
const romans = ["XII","I","II","III","IV","V","VI","VII","VIII","IX","X","XI"];
const centerX = 300;
const centerY = 300;
const radius = 230; 

const numGroup = document.getElementById("numbers");
const markGroup = document.getElementById("markers");

romans.forEach((num, i) => {
  const angleDeg = i * 30; 
  const angleRad = (angleDeg - 90) * Math.PI / 180; 
  const x = centerX + radius * Math.cos(angleRad);
  const y = centerY + radius * Math.sin(angleRad);

  const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
  text.setAttribute("transform", `translate(${x}, ${y}) rotate(${angleDeg})`);
  text.textContent = num;
  numGroup.appendChild(text);

  // Diamonds between numbers
  const markAngleDeg = angleDeg + 15;
  const markAngleRad = (markAngleDeg - 90) * Math.PI / 180;
  const xM = centerX + radius * Math.cos(markAngleRad);
  const yM = centerY + radius * Math.sin(markAngleRad);

  const diamond = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
  diamond.setAttribute("points", "0,-12 4,0 0,12 -4,0");
  diamond.setAttribute("class", "marker");
  diamond.setAttribute("transform", `translate(${xM}, ${yM}) rotate(${markAngleDeg})`);
  markGroup.appendChild(diamond);
});

function updateClock() {
  const now = new Date();
  const sec = now.getSeconds();
  const min = now.getMinutes();
  const hr = now.getHours();

  document.getElementById("second").style.transform = `rotate(${sec * 6}deg)`;
  document.getElementById("minute").style.transform = `rotate(${min * 6 + sec * 0.1}deg)`;
  document.getElementById("hour").style.transform = `rotate(${(hr % 12) * 30 + min * 0.5}deg)`;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
