<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fancy Classic Clock</title>

<style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #eee;
  margin: 0;
}

svg {
  width: 400px;
  height: 400px;
}

/* Numbers */
text {
  font-family: "Times New Roman", serif;
  font-size: 26px;
  fill: black;
  text-anchor: middle;
  dominant-baseline: middle;
}

/* Hands */
.hand {
  transform-origin: 200px 200px;
}

.hour {
  fill: black;
}

.minute {
  fill: black;
}

.second {
  stroke: red;
  stroke-width: 2;
}

/* Center dot */
.center {
  fill: black;
}
</style>
</head>

<body>

<svg viewBox="0 0 400 400">

  <!-- Center -->
  <circle cx="200" cy="200" r="5" class="center"/>

  <!-- Numbers -->
  <g id="numbers"></g>

  <!-- Fancy Hour Hand -->
  <path id="hour" class="hand hour"
  d="M200 200 
     C190 180, 190 160, 200 150 
     C210 160, 210 180, 200 200 
     L200 140 Z" />

  <!-- Fancy Minute Hand -->
  <path id="minute" class="hand minute"
  d="M200 200 
     C185 170, 185 130, 200 110 
     C215 130, 215 170, 200 200 
     L200 90 Z" />

  <!-- Second Hand -->
  <path id="second" class="hand second"
  d="M200 200 L200 80" />

</svg>

<script>
// Roman numbers
const romans = ["XII","I","II","III","IV","V","VI","VII","VIII","IX","X","XI"];
const radius = 160;
const centerX = 200;
const centerY = 200;

const group = document.getElementById("numbers");

romans.forEach((num, i) => {
  const angle = (i * 30 - 90) * Math.PI / 180;
  const x = centerX + radius * Math.cos(angle);
  const y = centerY + radius * Math.sin(angle);

  const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
  text.setAttribute("x", x);
  text.setAttribute("y", y);
  text.textContent = num;

  group.appendChild(text);
});

// Clock logic
function updateClock() {
  const now = new Date();

  const sec = now.getSeconds();
  const min = now.getMinutes();
  const hr = now.getHours();

  const secDeg = sec * 6;
  const minDeg = min * 6 + sec * 0.1;
  const hrDeg = (hr % 12) * 30 + min * 0.5;

  document.getElementById("second").style.transform = `rotate(${secDeg}deg)`;
  document.getElementById("minute").style.transform = `rotate(${minDeg}deg)`;
  document.getElementById("hour").style.transform = `rotate(${hrDeg}deg)`;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
